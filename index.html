<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Vault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0c0c0f; --surface:#13131a; --card:#18181f; --border:#2a2a38;
    --accent:#e8c97e; --accent2:#7e9ee8; --watched:#5bba8a;
    --text:#e8e8f0; --muted:#6a6a80; --radius:10px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  /* Auth */
  #auth-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:32px; background:radial-gradient(ellipse at 30% 40%,#1a1a2e 0%,var(--bg) 60%); }
  #auth-screen h1 { font-family:'DM Serif Display',serif; font-size:clamp(42px,6vw,72px); letter-spacing:-1px; }
  #auth-screen h1 em { color:var(--accent); font-style:italic; }
  #auth-screen p { color:var(--muted); font-size:15px; }
  #sign-in-btn { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:14px 28px; border-radius:50px; font-size:15px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .2s; }
  #sign-in-btn:hover { background:var(--card); border-color:var(--accent); color:var(--accent); }
  #sign-in-btn svg { width:20px; height:20px; }

  /* App */
  #app { display:none; flex-direction:column; height:100vh; }

  /* Header */
  #header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 16px; display:flex; align-items:center; gap:10px; height:52px; flex-shrink:0; position:sticky; top:0; z-index:50; }
  #header h1 { font-family:'DM Serif Display',serif; font-size:20px; color:var(--accent); white-space:nowrap; margin-right:4px; }
  #filters { display:flex; flex-wrap:wrap; gap:6px; align-items:center; flex:1; }
  .fg { display:flex; align-items:center; gap:4px; }
  .fl { font-size:11px; color:var(--muted); white-space:nowrap; }
  input[type=text],input[type=number],select { background:var(--card); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:6px; font-size:12px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .15s; }
  input[type=text]:focus,input[type=number]:focus,select:focus { border-color:var(--accent); }
  input[type=text] { width:150px; }
  input[type=number] { width:62px; }
  select { min-width:105px; cursor:pointer; }
  .type-toggle { display:flex; background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
  .type-btn { background:none; border:none; color:var(--muted); padding:4px 11px; font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .type-btn.active { background:var(--accent); color:#0c0c0f; font-weight:500; }
  #count { font-size:12px; color:var(--muted); white-space:nowrap; margin-left:auto; }
  #user-avatar { width:28px; height:28px; border-radius:50%; background:var(--border); cursor:pointer; border:2px solid var(--border); transition:border-color .2s; }
  #user-avatar:hover { border-color:var(--accent); }

  /* Grid */
  #grid { flex:1; overflow-y:auto; padding:14px 16px; display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:14px; align-content:start; }
  #grid::-webkit-scrollbar { width:5px; }
  #grid::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* Card */
  .card { background:var(--card); border-radius:var(--radius); overflow:visible; position:relative; transition:transform .2s,box-shadow .2s; }
  .card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,0,0,.5); z-index:2; }
  .poster-wrap { position:relative; border-radius:var(--radius) var(--radius) 0 0; overflow:hidden; aspect-ratio:2/3; background:var(--surface); }
  .poster-wrap img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .3s; }
  .poster-wrap img.loading { opacity:0; }
  .no-poster { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); font-size:10px; text-align:center; padding:12px; line-height:1.4; }
  .no-poster svg { opacity:.3; }

  /* Rating pill */
  .rating-pill { position:absolute; top:6px; right:6px; background:rgba(12,12,15,.85); backdrop-filter:blur(6px); border:1px solid var(--border); border-radius:20px; padding:2px 7px; font-size:11px; font-weight:500; color:var(--accent); cursor:pointer; transition:background .15s; z-index:3; }
  .rating-pill:hover { background:rgba(232,201,126,.15); }
  .rating-pill.empty { color:var(--muted); }

  /* Change poster btn */
  .change-poster-btn { position:absolute; bottom:6px; right:6px; background:rgba(12,12,15,.8); backdrop-filter:blur(4px); border:1px solid var(--border); border-radius:6px; color:var(--muted); font-size:10px; padding:3px 6px; cursor:pointer; opacity:0; transition:opacity .2s; z-index:3; white-space:nowrap; }
  .poster-wrap:hover .change-poster-btn { opacity:1; }
  .change-poster-btn:hover { color:var(--accent); border-color:var(--accent); }

  /* Card info */
  .card-info { padding:6px 8px 4px; }
  .card-title { font-size:11px; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
  .card-meta { font-size:10px; color:var(--muted); margin-top:2px; }

  /* Actions */
  .card-actions { display:flex; align-items:center; padding:3px 6px 7px; gap:4px; position:relative; }
  .act { width:26px; height:26px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:13px; transition:transform .12s,background .15s; flex-shrink:0; }
  .act:hover { transform:scale(1.2); }
  .act-watch        { background:rgba(85,51,170,0.25); color:rgba(136,102,204,0.5); border:1px solid rgba(85,51,170,0.3); }
  .act-watch.on     { background:#5533aa; color:#fff; border-color:#7744dd; }
  /* Green (collection) */
  .act-collect { background:#12a58b; color:#fff; border:1px solid rgba(0,0,0,0.15); }
  .act-collect.on { background:#12a58b; color:#fff; border-color:rgba(0,0,0,0.25); }

  /* Blue (lists) */
  .act-list { background:#2a2a3e; color:#7a7a9a; border:1px solid #3a3a52; }
  .act-list.on-list { background:#1f87e4; color:#fff; border-color:rgba(0,0,0,0.25); }
  /* Keep hover neutral unless illuminated by lists */
  .act-list:hover { background:#323245; color:#a7a7c8; border-color:#45455e; }
  .act-list.on-list:hover { background:#1677c8; color:#fff; border-color:rgba(0,0,0,0.25); }

  /* Popups */
  .popup { position:absolute; bottom:36px; background:#1e1e28; border:1px solid var(--border); border-radius:var(--radius); padding:10px; z-index:100; display:none; box-shadow:0 8px 32px rgba(0,0,0,.6); }
  .popup.vis { display:block; }
  .popup h5 { font-size:10px; color:var(--muted); margin-bottom:6px; font-weight:400; text-transform:uppercase; letter-spacing:.5px; }

  /* Rating popup */
  .rpop { right:0; bottom:30px; width:130px; }
  .rpop-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:4px; }
  .rpop-grid button { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:5px; padding:4px 0; font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .1s; }
  .rpop-grid button:hover,.rpop-grid button.selected { background:var(--accent); color:#0c0c0f; border-color:var(--accent); }

  /* List popup */
  .lpop { left:0; min-width:180px; }
  .list-item { display:flex; align-items:center; gap:8px; padding:5px 4px; border-radius:5px; cursor:pointer; font-size:12px; transition:background .1s; }
  .list-item:hover { background:var(--surface); }
  .list-item input[type=checkbox] { accent-color:var(--accent2); cursor:pointer; width:13px; height:13px; }

  /* Poster picker popup */
  .ppop { left:0; right:0; bottom:auto; top:6px; width:auto; max-height:340px; overflow-y:auto; }
  .ppop-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .ppop-grid img { width:100%; aspect-ratio:2/3; object-fit:cover; border-radius:5px; cursor:pointer; border:2px solid transparent; transition:border-color .15s; }
  .ppop-grid img:hover,.ppop-grid img.selected { border-color:var(--accent); }
  .ppop-loading { color:var(--muted); font-size:12px; text-align:center; padding:20px 0; }

  /* Modals */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.8); backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center; }
  .modal-overlay.vis { display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:26px; width:300px; text-align:center; }
  .modal-box h3 { font-family:'DM Serif Display',serif; font-size:18px; margin-bottom:6px; }
  .modal-box p { font-size:12px; color:var(--muted); margin-bottom:16px; }
  .modal-input { width:100%; padding:8px 12px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; }
  .modal-btn { flex:1; padding:9px; border:none; border-radius:8px; font-size:13px; font-family:'DM Sans',sans-serif; cursor:pointer; }
  .btn-confirm { background:var(--accent); color:#0c0c0f; font-weight:500; }
  .btn-cancel  { background:var(--card); color:var(--muted); border:1px solid var(--border); }

  /* TV Season Modal */
  #tv-watch-modal .modal-box { width:380px; }
  .season-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin:10px 0 14px; }
  .season-cb { display:none; }
  .season-lbl {
    display:flex; align-items:center; justify-content:center;
    height:36px; border-radius:6px; font-size:13px; font-weight:500;
    cursor:pointer; border:1px solid var(--border); background:var(--card);
    color:var(--muted); transition:all .15s; user-select:none;
  }
  .season-cb:checked + .season-lbl {
    background:rgba(91,186,138,.2); color:var(--watched);
    border-color:var(--watched);
  }
  .dropped-toggle {
    display:flex; align-items:center; gap:8px; margin:10px 0;
    font-size:13px; cursor:pointer;
  }
  .dropped-toggle input { accent-color:#e8a060; cursor:pointer; width:14px; height:14px; }
  .watch-pct-bar { height:4px; background:var(--border); border-radius:2px; margin-top:12px; overflow:hidden; }
  .watch-pct-fill { height:100%; border-radius:2px; transition:width .3s; }

  /* Watch button opacity based on completion */
  .act-watch { transition:background .15s, color .15s, opacity .15s, border-color .15s; }

  /* Large target mode (Vision Pro) */
  body.large-targets .act { width:42px; height:42px; font-size:16px; }
  body.large-targets .card-actions { gap:8px; padding:6px 8px 10px; }
  body.large-targets .rating-pill { font-size:13px; padding:4px 10px; }
  body.large-targets .change-poster-btn { font-size:12px; padding:5px 10px; opacity:1; }
  body.large-targets #grid { grid-template-columns:repeat(auto-fill,minmax(175px,1fr)); gap:18px; }
  body.large-targets .card-title { font-size:12px; }
  body.large-targets .card-meta  { font-size:11px; }
  body.large-targets .type-btn   { padding:6px 16px; font-size:13px; }
  body.large-targets input[type=text] { padding:7px 10px; font-size:13px; }
  body.large-targets select { padding:6px 10px; font-size:13px; }
  #large-target-btn { background:var(--card); border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; white-space:nowrap; transition:all .15s; }
  #large-target-btn.active { background:rgba(126,158,232,.2); border-color:var(--accent2); color:var(--accent2); }

  /* Loading/empty */
  #loading-state,#empty-state { grid-column:1/-1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:12px; color:var(--muted); }
  .nav-btn { background:none; border:none; color:var(--muted); padding:4px 14px; border-radius:5px; font-size:12px; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all .15s; }
  .nav-btn.active { background:var(--accent); color:#0c0c0f; font-weight:500; }
  .nav-btn:hover:not(.active) { color:var(--text); background:var(--card); }

  /* Stats page */
  #stats-page { display:none; flex:1; overflow-y:auto; padding:24px; }
  #stats-page.vis { display:block; }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; margin-bottom:28px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
  .stat-card h3 { font-family:'DM Serif Display',serif; font-size:16px; color:var(--accent); margin-bottom:14px; }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid var(--border); font-size:13px; }
  .stat-row:last-child { border-bottom:none; }
  .stat-row .label { color:var(--muted); }
  .stat-row .value { font-weight:500; color:var(--text); }
  .bar-wrap { margin-top:6px; }
  .bar-label { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-bottom:3px; }
  .bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .bar-fill  { height:100%; background:var(--accent); border-radius:3px; transition:width .6s ease; }
  .bar-fill.tv { background:var(--accent2); }
  .year-select { background:var(--card); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:6px; font-size:12px; font-family:'DM Sans',sans-serif; margin-left:auto; display:block; margin-bottom:12px; }
  .month-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:6px; }
  .month-cell { background:var(--surface); border-radius:6px; padding:6px 4px; text-align:center; }
  .month-cell .mn { font-size:10px; color:var(--muted); }
  .month-cell .mc { font-size:16px; font-weight:bold; color:var(--text); }
  .month-cell.has-watches { background:#1e1e30; }
  .completion-ring { display:flex; align-items:center; gap:16px; }
  .ring-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; color:var(--accent); }
  .ring-info { font-size:13px; line-height:1.8; }
  .ring-info span { color:var(--muted); font-size:11px; display:block; }

  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div style="text-align:center">
    <h1>Media <em>Vault</em></h1>
    <p style="margin-top:8px">Your personal film &amp; television archive</p>
  </div>
  <button id="sign-in-btn" onclick="signIn()">
    <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
  <p id="auth-error" style="color:#e87e7e;display:none;font-size:13px"></p>
</div>

<!-- App -->
<div id="app">
  <div id="nav-bar" style="background:#0e0e16;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;height:36px;flex-shrink:0;gap:4px;">
    <button class="nav-btn active" id="nav-gallery" onclick="showView('gallery')">🎬 Gallery</button>
    <button class="nav-btn" id="nav-stats" onclick="showView('stats')">📊 Stats</button>
  </div>
  <div id="header">
    <h1>Media Vault</h1>
    <div id="filters">
      <div class="type-toggle">
        <button class="type-btn active" id="tb-all"    onclick="setType('all')">All</button>
        <button class="type-btn"        id="tb-movies" onclick="setType('movie')">Movies</button>
        <button class="type-btn"        id="tb-tv"     onclick="setType('tv')">TV</button>
      </div>
      <div class="fg"><input type="text" id="f-search" placeholder="Search titles…" oninput="debouncedFilter()"></div>
      <div class="fg">
        <span class="fl">Watched</span>
        <select id="f-watched" onchange="applyFilters(true)">
          <option value="">All</option><option value="yes">Watched</option>
          <option value="no">Unwatched</option><option value="null">— Hide —</option>
        </select>
      </div>
      <div class="fg">
        <span class="fl">Collection</span>
        <select id="f-collect" onchange="applyFilters(true)">
          <option value="">All</option><option value="yes">Collected</option>
          <option value="no">Not collected</option><option value="null">— Hide —</option>
        </select>
      </div>
      <div class="fg">
        <span class="fl">List</span>
        <select id="f-list" onchange="applyFilters(true)">
          <option value="">Any</option>
          <option value="watchlist">Watchlist</option>
          <option value="list1001">1001 List</option>
          <option value="list1001d">1001 w/Deletions</option>
          <option value="holly">Watch with Holly</option>
          <option value="none">— Not on any list —</option>
          <option value="tv-incomplete">📺 Incomplete TV collection</option>
          <option value="tv-full">✅ Fully watched TV</option>
          <option value="tv-partial">〰️ Partially watched TV</option>
          <option value="tv-notstarted">⭕ Not started TV</option>
          <option value="tv-behind">⏩ TV — behind on seasons</option>
          <option value="tv-dropped">🚫 Dropped shows</option>
        </select>
      </div>
      <div class="fg">
        <span class="fl">Year</span>
        <input type="number" id="f-y1" placeholder="From" oninput="applyFilters()">
        <input type="number" id="f-y2" placeholder="To"   oninput="applyFilters()">
      </div>
      <div class="fg">
        <span class="fl">Rating</span>
        <input type="number" id="f-r1" placeholder="Min" min="1" max="10" oninput="applyFilters()">
        <input type="number" id="f-r2" placeholder="Max" min="1" max="10" oninput="applyFilters()">
      </div>
      <div class="fg">
        <span class="fl">Country</span>
        <select id="f-country" onchange="applyFilters(true)"><option value="">All</option></select>
      </div>
      <div class="fg">
        <span class="fl">Language</span>
        <select id="f-lang" onchange="applyFilters(true)"><option value="">All</option></select>
      </div>
      <div class="fg">
        <span class="fl">Sort</span>
        <select id="f-sort" onchange="applyFilters()">
          <option value="title-asc">Title A→Z</option>
          <option value="title-desc">Title Z→A</option>
          <option value="year-desc">Year (newest)</option>
          <option value="year-asc">Year (oldest)</option>
          <option value="rating-desc">Rating ↓</option>
          <option value="rating-asc">Rating ↑</option>
          <option value="random">Random</option>
        </select>
      </div>
      <span id="count"></span>
    </div>
    <button id="large-target-btn" onclick="toggleLargeTargets()" title="Toggle large touch targets (Vision Pro)">⊕</button>
    <img id="user-avatar" title="Signed in" alt="User">
  </div>
  <div id="grid"><div id="loading-state"><div class="spinner"></div><p>Loading your library…</p></div></div>
  <div id="stats-page"></div>
</div>

<!-- TV Watch Modal -->
<div class="modal-overlay" id="tv-watch-modal">
  <div class="modal-box">
    <h3>Log a watch</h3>
    <p id="tv-modal-title" style="color:var(--muted);font-size:12px;margin-bottom:4px"></p>
    <div id="season-checkboxes" style="min-height:50px"><p style="color:var(--muted);font-size:12px">Loading seasons…</p></div>
    <label class="dropped-toggle">
      <input type="checkbox" id="dropped-cb"> Mark as Dropped (stopped watching)
    </label>
    <div style="margin-top:10px">
      <span class="fl">Date watched</span>
      <input type="date" id="tv-date-input" class="modal-input" style="margin-top:6px">
    </div>
    <div class="modal-actions">
      <button class="modal-btn btn-confirm" onclick="confirmTVWatch()">Save</button>
      <button class="modal-btn btn-cancel"  onclick="cancelTVWatch()">Cancel</button>
    </div>
  </div>
</div>

<!-- Date modal -->
<div class="modal-overlay" id="date-modal">
  <div class="modal-box">
    <h3>Log a watch</h3>
    <p id="date-modal-title"></p>
    <input type="date" id="date-input" class="modal-input">
    <div class="modal-actions">
      <button class="modal-btn btn-confirm" onclick="confirmWatch()">Save</button>
      <button class="modal-btn btn-cancel"  onclick="cancelWatch()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── Debounce ─────────────────────────────────────────────────
let _filterTimer = null;
function debouncedFilter() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(()=>applyFilters(true), 200);
}

// ── Config ───────────────────────────────────────────────────
const CLIENT_ID = '740123788552-hb48rl4ejh63q7eitpn283genf2fj3tv.apps.googleusercontent.com';
const DEFAULT_SHEET_ID = '1ze-t_ErYfc_5ih3ZA89lS2XgwtBAmXIO-E54AMqcG1U';
const DEFAULT_IS_PLACEHOLDER = DEFAULT_SHEET_ID === 'YOUR_SHEET_ID_HERE';
let SHEET_ID = DEFAULT_SHEET_ID;
// Allow passing sheetId via URL (preferred) to avoid editing the file.
try {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('sheetId');
  if (fromUrl) SHEET_ID = fromUrl.trim();
} catch (e) {}
// Persist URL sheetId so we don't need it again on future logins.
try {
  if (SHEET_ID && SHEET_ID !== DEFAULT_SHEET_ID) {
    localStorage.setItem('mv_sheet_id', SHEET_ID);
    sessionStorage.setItem('mv_sheet_id', SHEET_ID);

} catch (e) {}
// Persist sheetId once provided so subsequent reloads work.
try {
  const saved = localStorage.getItem('mv_sheet_id');
  // Only apply saved value if the URL didn't provide one.
  if (SHEET_ID === DEFAULT_SHEET_ID && saved && saved !== DEFAULT_SHEET_ID) {
    SHEET_ID = saved.trim();
  }
} catch (e) {}
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const TMDB_KEY  = 'a746e092fa14f46f1abdbca19e11d8b7';

// ── Column maps (0-based) ────────────────────────────────────
const MC = {TITLE:0,YEAR:1,RATING:2,WATCHED:3,LAST_WATCHED:4,TIMES:5,RELEASE:6,RUNTIME:7,COUNTRY:8,LANGUAGE:9,WATCHLIST:10,LIST_1001:11,LIST_1001_D:12,HOLLY:13,COLLECTION:14,POSTER:15,TMDB_ID:16,IMDB_ID:17,DATE_ADDED:18};
const TC = {TITLE:0,YEAR:1,RATING:2,WATCHED:3,LAST_WATCHED:4,TIMES:5,RELEASE:6,RUNTIME:7,COUNTRY:8,LANGUAGE:9,WATCHLIST:10,LIST_1001:11,LIST_1001_D:12,HOLLY:13,COLLECTION:14,SEASONS:15,SEASONS_WATCHED:16,POSTER:17,TMDB_ID:18,IMDB_ID:19,DATE_ADDED:20};

// Formatting constants matching the spreadsheet
const FMT_CENTER = { horizontalAlignment: 'CENTER' };
const FMT_LIST_YES = { backgroundColor: { red:0.839, green:0.894, blue:0.969 }, horizontalAlignment:'CENTER' };

// ── State ────────────────────────────────────────────────────
let tokenClient, accessToken;
let allItems = [], filtered = [];
let curType  = 'all';
let pendingWatch = null;
let openPopup    = null;

// ── Auth (with token persistence) ───────────────────────────
function loadGIS() {
  const s = document.createElement('script');
  s.src = 'https://accounts.google.com/gsi/client';
  s.onload = initGIS;
  document.head.appendChild(s);
}

function initGIS() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: onToken,
  });

  // Try to restore saved token
  const saved = sessionStorage.getItem('mv_token');
  const expiry = parseInt(sessionStorage.getItem('mv_token_expiry') || '0');
  if (saved && Date.now() < expiry) {
    accessToken = saved;
    showApp();
  }
}

function signIn() { tokenClient.requestAccessToken(); }

function onToken(resp) {
  if (resp.error) {
    document.getElementById('auth-error').textContent = 'Sign-in failed: ' + resp.error;
    document.getElementById('auth-error').style.display = 'block';
    return;
  }
  accessToken = resp.access_token;
  // Store token for the session + 55 min (tokens last ~1hr)
  sessionStorage.setItem('mv_token', accessToken);
  sessionStorage.setItem('mv_token_expiry', Date.now() + 55 * 60 * 1000);
  showApp();
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  loadUserAvatar();
  loadSheetData();
  loadWatchLog();
}

function loadUserAvatar() {
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + accessToken }
  }).then(r => r.json()).then(u => {
    if (u.picture) document.getElementById('user-avatar').src = u.picture;
  }).catch(() => {});
}

// ── Sheet Read ───────────────────────────────────────────────
async function loadSheetData() {
  showLoading(true);
  try {
    if (!ensureSheetId()) {
      showFatalError(
        'Missing Google Sheet ID. ' +
        'Open the webapp with `?sheetId=YOUR_SHEET_ID` or set `mv_sheet_id` in localStorage.'
      );
      return;
    }
    const [movies, shows] = await Promise.all([
      fetchSheet('Movies'), fetchSheet('TV Shows'),
    ]);
    allItems = [
      ...movies.slice(1).filter(r => r[0]).map((r,i) => rowToItem(r, MC, 'movie', i+2)),
      ...shows.slice(1).filter(r => r[0]).map((r,i) => rowToItem(r, TC, 'tv',    i+2)),
    ];
    populateDropdowns();
    applyFilters();
  } catch(e) {
    console.error(e);
    showLoading(false);
  }
}

function ensureSheetId() {
  // If the default is a real Sheet ID, never prompt.
  if (!DEFAULT_IS_PLACEHOLDER) return !!SHEET_ID;

  // Always re-check stored sheet id first (so we don't reprompt after login).
  try {
    const saved = localStorage.getItem('mv_sheet_id');
    const ssaved = sessionStorage.getItem('mv_sheet_id');
    const candidate = (saved && saved !== DEFAULT_SHEET_ID) ? saved : (ssaved && ssaved !== DEFAULT_SHEET_ID ? ssaved : '');
    if (candidate) SHEET_ID = candidate.trim();
  } catch (e) {}

  // If we already have a real sheet id, we're good.
  if (SHEET_ID && SHEET_ID !== DEFAULT_SHEET_ID) return true;

  // If placeholder is still present, attempt to prompt once per tab session.
  try {
    const prompted = sessionStorage.getItem('mv_sheet_id_prompted') === '1';
    if (!prompted) {
      const entered = window.prompt(
        'Enter your Google Sheets ID (the long id in /spreadsheets/d/<id>/...):'
      );
      sessionStorage.setItem('mv_sheet_id_prompted', '1');
      if (entered && entered.trim() && entered.trim() !== DEFAULT_SHEET_ID) {
        SHEET_ID = entered.trim();
        localStorage.setItem('mv_sheet_id', SHEET_ID);
        sessionStorage.setItem('mv_sheet_id', SHEET_ID);
        return true;
      }
    }
  } catch (e) {}
  return false;
}

function showFatalError(message) {
  showLoading(false);
  const grid = document.getElementById('grid');
  if (!grid) return;
  grid.innerHTML = '';
  const e = document.createElement('div');
  e.id = 'empty-state';
  e.style.display = 'flex';
  e.style.gridColumn = '1/-1';
  e.innerHTML = '<p style="max-width:720px;text-align:center">' + esc(message) + '</p>';
  grid.appendChild(e);
  const countEl = document.getElementById('count');
  if (countEl) countEl.textContent = '';
}

async function fetchSheet(name, rangeA1) {
  // Use an explicit A1 range to avoid any API ambiguity.
  const range = rangeA1 || `${name}!A:Z`;
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`;
  const r   = await fetch(url, { headers:{ Authorization:'Bearer '+accessToken } });
  const d   = await r.json();
  return d.values || [];
}

function rowToItem(row, cols, type, rowNum) {
  const r = v => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    return s.startsWith("'") ? s.slice(1) : s;
  };
  return {
    _row:rowNum, _type:type,
    _sheet: type==='movie' ? 'Movies' : 'TV Shows',
    title:      r(row[cols.TITLE]),
    year:       r(row[cols.YEAR]),
    rating:     r(row[cols.RATING]),
    watched:    r(row[cols.WATCHED]),
    lastWatched:r(row[cols.LAST_WATCHED]),
    times:      r(row[cols.TIMES]),
    release:    r(row[cols.RELEASE]),
    runtime:    r(row[cols.RUNTIME]),
    country:    r(row[cols.COUNTRY]),
    language:   r(row[cols.LANGUAGE]),
    watchlist:  r(row[cols.WATCHLIST]),
    list1001:   r(row[cols.LIST_1001]),
    list1001d:  r(row[cols.LIST_1001_D]),
    holly:      r(row[cols.HOLLY]),
    collection: r(row[cols.COLLECTION]),
    seasons:    type==='tv' ? r(row[cols.SEASONS]) : '',
    seasonsWatched: type==='tv' ? r(row[cols.SEASONS_WATCHED]) : '',
    poster:     r(row[cols.POSTER]),
    tmdbId:     r(row[cols.TMDB_ID]),
  };
}

function showLoading(show) {
  const ls = document.getElementById('loading-state');
  if (ls) ls.style.display = show ? 'flex' : 'none';
}

// ── Sheet Write ──────────────────────────────────────────────

// Sanitize a value before writing to the sheet:
// - null/undefined → empty string
// - strip leading apostrophes Google Sheets adds to force text
// - convert numeric strings to actual numbers where safe
function cleanVal(v) {
  if (v === null || v === undefined) return '';
  if (typeof v === 'number') return v;
  let s = String(v);
  // Strip leading apostrophe (Google Sheets text-force prefix)
  if (s.startsWith("'")) s = s.slice(1);
  // Empty after strip
  if (s === '' || s === 'None') return '';
  // Convert to number if it looks purely numeric
  if (/^-?\d+(\.\d+)?$/.test(s)) return Number(s);
  return s;
}

async function updateCells(item, updates) {
  const cols = item._type==='movie' ? MC : TC;
  const data = updates.map(u => ({
    range: `${item._sheet}!${colLetter(cols[u.col])}${item._row}`,
    values: [[cleanVal(u.val)]],
  }));
  await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values:batchUpdate`,
    { method:'POST', headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
      body: JSON.stringify({ valueInputOption:'RAW', data }) }
  );
}

// Apply formatting to specific cells via Sheets batchUpdate (spreadsheets API)
async function applyFormatting(item, colKey, fmt) {
  const cols   = item._type==='movie' ? MC : TC;
  const colIdx = cols[colKey];
  const rowIdx = item._row - 1; // 0-based
  const sheetId = item._type==='movie' ? 0 : 1; // we'll look this up properly below

  // Fetch sheet metadata to get correct sheetId
  const meta = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}?fields=sheets.properties`,
    { headers:{ Authorization:'Bearer '+accessToken } }
  ).then(r=>r.json());

  const sheetProps = meta.sheets.find(s => s.properties.title === item._sheet);
  if (!sheetProps) return;
  const sid = sheetProps.properties.sheetId;

  const req = {
    repeatCell: {
      range: { sheetId:sid, startRowIndex:rowIdx, endRowIndex:rowIdx+1, startColumnIndex:colIdx, endColumnIndex:colIdx+1 },
      cell: { userEnteredFormat: fmt },
      fields: 'userEnteredFormat(backgroundColor,horizontalAlignment)',
    }
  };

  await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}:batchUpdate`,
    { method:'POST', headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
      body: JSON.stringify({ requests:[req] }) }
  );
}

function colLetter(idx) {
  let l='', n=idx+1;
  while(n>0){ l=String.fromCharCode(65+(n-1)%26)+l; n=Math.floor((n-1)/26); }
  return l;
}

// ── Filters ──────────────────────────────────────────────────
function populateDropdowns() {
  const cos = [...new Set(allItems.map(i=>i.country).filter(Boolean))].sort();
  const las = [...new Set(allItems.map(i=>i.language).filter(Boolean))].sort();
  const cSel=document.getElementById('f-country'), lSel=document.getElementById('f-lang');
  cos.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cSel.appendChild(o);});
  las.forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;lSel.appendChild(o);});
}

function setType(t) {
  curType=t;
  ['all','movies','tv'].forEach(id=>document.getElementById('tb-'+id).classList.toggle('active',id===t));
  applyFilters();
}

// Normalize titles for sorting (ignore leading articles like "The", "A", "An")
function titleSortKey(title) {
  let s = String(title || '').trim();
  if (!s) return '';
  // Strip leading quotes/brackets to avoid cases like '"The X"'
  s = s.replace(/^[\s"'“”‘’\(\)\[\]\{\}]+/g, '');
  // Strip leading articles
  s = s.replace(/^(the|a|an)\s+/i, '');
  return s.toLowerCase();
}

function applyFilters(fromFilterChange) {
  // When a non-sort filter changes, recall the saved sort for this new combo
  if (fromFilterChange) recallSort();
  const s   = document.getElementById('f-search').value.toLowerCase();
  const fw  = document.getElementById('f-watched').value;
  const fc  = document.getElementById('f-collect').value;
  const fl  = document.getElementById('f-list').value;
  const fy1 = parseInt(document.getElementById('f-y1').value)||0;
  const fy2 = parseInt(document.getElementById('f-y2').value)||9999;
  const fr1 = parseFloat(document.getElementById('f-r1').value)||0;
  const fr2 = parseFloat(document.getElementById('f-r2').value)||10;
  const fco = document.getElementById('f-country').value;
  const fla = document.getElementById('f-lang').value;
  const srt = document.getElementById('f-sort').value;

  filtered = allItems.filter(i => {
    if (curType!=='all' && i._type!==curType) return false;
    if (s && !i.title.toLowerCase().includes(s)) return false;

    const w = i.watched.toLowerCase()==='yes';
    if (fw==='yes'  && !w) return false;
    if (fw==='no'   && w)  return false;
    if (fw==='null' && w)  return false; // hide watched

    const col = i.collection.toLowerCase()==='yes';
    if (fc==='yes'  && !col) return false;
    if (fc==='no'   && col)  return false;
    if (fc==='null' && col)  return false; // hide collected

    const onAny = i.watchlist.toLowerCase()==='yes' || i.list1001.toLowerCase()==='yes' ||
                  i.list1001d.toLowerCase()==='yes' || i.holly.toLowerCase()==='yes';
    if (fl==='watchlist' && i.watchlist.toLowerCase()!=='yes') return false;
    if (fl==='list1001'  && i.list1001.toLowerCase()!=='yes')  return false;
    if (fl==='list1001d' && i.list1001d.toLowerCase()!=='yes') return false;
    if (fl==='holly'     && i.holly.toLowerCase()!=='yes')     return false;
    if (fl==='none'      && onAny) return false;
    if (fl==='tv-incomplete') {
      if (i._type !== 'tv' || i.collection.toLowerCase() !== 'yes') return false;
      const cached = tmdbSeasonCache[i.tmdbId];
      if (cached === undefined) return true;
      if (cached === null) return false;
      if (parseCollectedSeasons(i.seasons).length >= cached) return false;
    }
    if (fl==='tv-full') {
      if (i._type !== 'tv') return false;
      const cached = tmdbSeasonCache[i.tmdbId];
      if (!cached) return false;
      if (parseWatchedSeasons(i.seasonsWatched).length < cached) return false;
    }
    if (fl==='tv-partial') {
      if (i._type !== 'tv') return false;
      const sw = parseWatchedSeasons(i.seasonsWatched).length;
      const cached = tmdbSeasonCache[i.tmdbId];
      if (sw === 0) return false;
      if (cached && sw >= cached) return false;
    }
    if (fl==='tv-notstarted') {
      if (i._type !== 'tv') return false;
      if (parseWatchedSeasons(i.seasonsWatched).length > 0) return false;
      if (i.watched === 'Dropped') return false;
    }
    if (fl==='tv-behind') {
      if (i._type !== 'tv') return false;
      const cached = tmdbSeasonCache[i.tmdbId];
      if (!cached) return false;
      const sw = parseWatchedSeasons(i.seasonsWatched).length;
      if (sw === 0 || sw >= cached) return false;
    }
    if (fl==='tv-dropped') {
      if (i._type !== 'tv' || i.watched !== 'Dropped') return false;
    }

    const yr=parseInt(i.year)||0;
    if (yr && (yr<fy1||yr>fy2)) return false;
    const rt=parseFloat(i.rating)||0;
    if (i.rating&&(rt<fr1||rt>fr2)) return false;
    if (fco && i.country!==fco) return false;
    if (fla && i.language!==fla) return false;
    return true;
  });

  if (srt==='random') {
    for (let i=filtered.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [filtered[i],filtered[j]]=[filtered[j],filtered[i]];
    }
  } else {
    filtered.sort((a,b)=>{
      if (srt==='title-asc')   {
        const ka = titleSortKey(a.title);
        const kb = titleSortKey(b.title);
        const c = ka.localeCompare(kb);
        return c !== 0 ? c : String(a.title).localeCompare(String(b.title));
      }
      if (srt==='title-desc')  {
        const ka = titleSortKey(a.title);
        const kb = titleSortKey(b.title);
        const c = kb.localeCompare(ka);
        return c !== 0 ? c : String(b.title).localeCompare(String(a.title));
      }
      if (srt==='year-desc')   return (parseInt(b.year)||0)-(parseInt(a.year)||0);
      if (srt==='year-asc')    return (parseInt(a.year)||0)-(parseInt(b.year)||0);
      if (srt==='rating-desc') return (parseFloat(b.rating)||0)-(parseFloat(a.rating)||0);
      if (srt==='rating-asc')  return (parseFloat(a.rating)||0)-(parseFloat(b.rating)||0);
      return 0;
    });
  }

  document.getElementById('count').textContent = filtered.length.toLocaleString()+' titles';
  // Save current sort for this filter combination
  const sortSel = document.getElementById('f-sort');
  if (sortSel) saveSort(sortSel.value);
  renderGrid();
}

// ── Render ───────────────────────────────────────────────────
const PAGE_SIZE = 80; // cards per page
let renderedCount = 0;
let isRendering = false;

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  renderedCount = 0;

  if (!filtered.length) {
    const e = document.createElement('div'); e.id = 'empty-state';
    e.innerHTML = '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>No titles match your filters</p>';
    grid.appendChild(e); return;
  }

  renderNextPage();
}

function renderNextPage() {
  if (isRendering) return;
  const grid = document.getElementById('grid');
  const batch = filtered.slice(renderedCount, renderedCount + PAGE_SIZE);
  if (!batch.length) return;

  isRendering = true;
  const frag = document.createDocumentFragment();
  batch.forEach(item => frag.appendChild(makeCard(item)));
  grid.appendChild(frag);
  renderedCount += batch.length;
  isRendering = false;
}

// Infinite scroll — load more as user scrolls down
function setupInfiniteScroll() {
  const grid = document.getElementById('grid');
  grid.addEventListener('scroll', () => {
    if (grid.scrollTop + grid.clientHeight >= grid.scrollHeight - 300) {
      renderNextPage();
    }
  });
}

function makeCard(item) {
  const card=document.createElement('div'); card.className='card';
  const isW=item.watched.toLowerCase()==='yes';
  const isC=item.collection.toLowerCase()==='yes';

  // Poster wrap
  const pw=document.createElement('div'); pw.className='poster-wrap';
  renderPoster(pw, item);

  // Rating pill
  const rp=document.createElement('div');
  rp.className='rating-pill'+(item.rating?'':' empty');
  rp.title='Set rating'; rp.textContent=item.rating||'·';
  const rpop=makeRatingPopup(item,rp);
  rp.onclick=e=>{e.stopPropagation();togglePopup(rpop);};
  pw.appendChild(rp); pw.appendChild(rpop);

  // Change poster button
  const cpBtn=document.createElement('button');
  cpBtn.className='change-poster-btn'; cpBtn.textContent='⇄ Poster';
  cpBtn.onclick=e=>{e.stopPropagation(); openPosterPicker(item, pw);};
  pw.appendChild(cpBtn);

  card.appendChild(pw);

  // Info
  const info=document.createElement('div'); info.className='card-info';
  const meta=[item.year, item.runtime?item.runtime+' min':''].filter(Boolean).join(' · ');
  info.innerHTML=`<div class="card-title" title="${esc(item.title)}">${esc(item.title)}</div>
                  <div class="card-meta">${esc(meta)}${item._type==='tv'?' · TV':''}</div>`;
  card.appendChild(info);

  // Actions
  const acts=document.createElement('div'); acts.className='card-actions';
  const bW=actBtn('act-watch','✓','Mark as watched');
  bW.onclick=()=>logWatch(item,bW,pw);
  // Set initial TV button appearance after card is in DOM
  if (item._type==='tv') {
    const cachedTotal = tmdbSeasonCache[item.tmdbId];
    updateTVWatchBtn(bW, item, cachedTotal||0);
  } else if (isW) {
    bW.classList.add('on');
    bW.title='Log another watch';
  }
  const bC=actBtn('act-collect'+(isC?' on':''),'⬡',isC?'In collection (click to remove)':'Add to collection');
  bC.onclick=()=>toggleCollect(item,bC,pw);
  const onAnyList = ['watchlist','list1001','list1001d','holly'].some(k=>item[k].toLowerCase()==='yes');
  const bL=actBtn('act-list'+(onAnyList?' on-list':''),'≡','Lists');
  const lpop=makeListPopup(item);
  bL.onclick=e=>{e.stopPropagation();togglePopup(lpop);};
  acts.appendChild(bW); acts.appendChild(bC); acts.appendChild(bL); acts.appendChild(lpop);
  card.appendChild(acts);

  document.addEventListener('click',()=>{lpop.classList.remove('vis');rpop.classList.remove('vis');});

  // Async season check for all TV shows
  if (item._type==='tv') {
    setTimeout(()=>updateSeasonBadge(item, card), 50);
  }

  return card;
}

function renderPoster(pw, item) {
  // Clear existing img/no-poster (keep overlay buttons)
  [...pw.children].forEach(c=>{if(c.tagName==='IMG'||c.classList.contains('no-poster')) c.remove();});
  if (item.poster) {
    const img=document.createElement('img'); img.alt=item.title;
    img.style.opacity='0'; img.style.transition='opacity .3s';
    img.onerror=()=>img.replaceWith(noPoster(item.title));
    // Insert before setting src so onload fires after element is in DOM
    pw.insertBefore(img, pw.firstChild);
    img.onload=()=>{ img.style.opacity='1'; };
    img.src=item.poster;
    // If already cached, onload may not fire — force visible
    if (img.complete) img.style.opacity='1';
  } else {
    pw.insertBefore(noPoster(item.title), pw.firstChild);
  }
}

function noPoster(title) {
  const d=document.createElement('div'); d.className='no-poster';
  d.innerHTML=`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>${esc(title)}</span>`;
  return d;
}

function actBtn(cls,text,title) {
  const b=document.createElement('button'); b.className='act '+cls; b.textContent=text; b.title=title; return b;
}

async function openPosterPicker(item, pw) {
  // Remove existing picker popup
  pw.querySelectorAll('.ppop').forEach(p=>p.remove());

  const pop=document.createElement('div'); pop.className='popup ppop vis';
  pop.innerHTML='<h5>Choose poster</h5><div class="ppop-loading">Fetching options…</div>';
  pw.appendChild(pop);
  pop.onclick=e=>e.stopPropagation();

  try {
    const type = item._type==='movie' ? 'movie' : 'tv';
    const id   = item.tmdbId;
    if (!id) { pop.innerHTML='<h5>Choose poster</h5><p style="color:var(--muted);font-size:12px">No TMDb ID found for this title.</p>'; return; }

    const url = `https://api.themoviedb.org/3/${type}/${id}/images?api_key=${TMDB_KEY}`;
    const data = await fetch(url).then(r=>r.json());
    const posters = (data.posters||[]).slice(0,12);

    if (!posters.length) { pop.innerHTML='<h5>Choose poster</h5><p style="color:var(--muted);font-size:12px">No alternate posters found.</p>'; return; }

    pop.innerHTML='<h5>Choose poster</h5>';
    const grid=document.createElement('div'); grid.className='ppop-grid';
    posters.forEach(p=>{
      const fullUrl=`https://image.tmdb.org/t/p/w500${p.file_path}`;
      const img=document.createElement('img'); img.src=fullUrl; img.alt='Poster option';
      if (item.poster===fullUrl) img.classList.add('selected');
      img.onclick=async ()=>{
        item.poster=fullUrl;
        pop.remove();
        renderPoster(pw, item);
        await updateCells(item,[{col:'POSTER',val:fullUrl}]);
      };
      grid.appendChild(img);
    });
    pop.appendChild(grid);
  } catch(e) {
    pop.innerHTML='<h5>Choose poster</h5><p style="color:var(--muted);font-size:12px">Could not load posters.</p>';
  }

  // Close on outside click
  setTimeout(()=>{
    document.addEventListener('click',()=>pop.remove(),{once:true});
  },10);
}

}

async function confirmTVWatch() {
  if (!pendingTVWatch) return;
  const {item, btn, pw} = pendingTVWatch;
  const d       = document.getElementById('tv-date-input').value;
  const dropped = document.getElementById('dropped-cb').checked;

  const checkedSeasons = [...document.querySelectorAll('.season-cb:checked')].map(cb=>parseInt(cb.value));
  const totalSeasons   = document.querySelectorAll('.season-cb').length;

  // Merge with previously watched seasons
  const prev    = parseWatchedSeasons(item.seasonsWatched);
  const merged  = [...new Set([...prev, ...checkedSeasons])].sort((a,b)=>a-b);
  const seasonsStr = merged.join(', ');

  // Determine watched status
  let watchedVal = '';
  if (dropped) {
    watchedVal = 'Dropped';
  } else if (merged.length > 0 && totalSeasons > 0 && merged.length >= totalSeasons) {
    watchedVal = 'Yes';
  } else if (merged.length > 0) {
    watchedVal = 'Yes'; // at least started — column shows "Yes" for any watched
  }

  item.seasonsWatched = seasonsStr;
  item.watched        = dropped ? 'Dropped' : (merged.length > 0 ? 'Yes' : '');
  item.lastWatched    = d || item.lastWatched;
  item.times          = (parseInt(item.times)||0) + (checkedSeasons.length > 0 || dropped ? 1 : 0);

  // Update watch button appearance
  updateTVWatchBtn(btn, item, totalSeasons || tmdbSeasonCache[item.tmdbId] || 0);

  document.getElementById('tv-watch-modal').classList.remove('vis');
  pendingTVWatch = null;

  const updates = [
    {col:'SEASONS_WATCHED', val:seasonsStr},
    {col:'WATCHED',         val:item.watched},
    {col:'LAST_WATCHED',    val:item.lastWatched},
    {col:'TIMES',           val:item.times},
  ];
  if (item.watchlist.toLowerCase() === 'yes' && item.watched === 'Yes') {
    item.watchlist = '';
    updates.push({col:'WATCHLIST', val:''});
  }
  updateCells(item, updates);
}

function cancelTVWatch() {
  document.getElementById('tv-watch-modal').classList.remove('vis');

}

function parseWatchedSeasons(str) {
  if (!str) return [];
  return String(str).split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
}

function tvWatchPct(item, totalSeasons) {
  if (!totalSeasons) return 0;
  const watched = parseWatchedSeasons(item.seasonsWatched).length;
  return Math.min(watched / totalSeasons, 1);
}

function updateTVWatchBtn(btn, item, totalSeasons) {
  const dropped = item.watched === 'Dropped';
  const pct     = tvWatchPct(item, totalSeasons);

  // Reset all inline styles
  btn.style.background  = '';
  btn.style.color       = '';
  btn.style.borderColor = '';
  btn.classList.remove('on');

  if (dropped) {
    btn.style.background  = 'rgba(232,160,96,0.9)';
    btn.style.color       = '#fff';
    btn.style.borderColor = '#e8a060';
    btn.title = 'Dropped — click to update';
  } else if (pct === 0) {
    // Not started — CSS default (faint purple via rgba)
    btn.title = 'Mark seasons watched';
  } else if (pct >= 1) {
    // Fully watched — solid purple
    btn.classList.add('on');
    btn.title = 'Fully watched — click to update';
  } else {
    // Partially watched — interpolate alpha from 0.25 to 0.9
    const alpha = (0.25 + pct * 0.65).toFixed(2);
    btn.classList.add('on');
    btn.style.background  = `rgba(85,51,170,${alpha})`;
    btn.style.color       = pct > 0.4 ? '#fff' : 'rgba(255,255,255,0.7)';
    btn.style.borderColor = `rgba(119,68,221,${alpha})`;
    btn.title = `${Math.round(pct*100)}% watched — click to update`;
  }
}

// ── Stats ─────────────────────────────────────────────────────
let watchLogData = [];

async function loadWatchLog() {
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent('Watch Log!A:E')}`;
    const r   = await fetch(url, { headers:{ Authorization:'Bearer '+accessToken } });
    const d   = await r.json();
    const rows = (d.values || []).slice(1); // skip header
    watchLogData = rows.map(r => ({
      date:  r[0] || '',
      title: r[1] || '',
      year:  r[2] || '',
      type:  r[3] || '', // 'Movie' or 'TV Show'
    })).filter(r => r.date);
    console.log('Watch log loaded:', watchLogData.length, 'entries');
  } catch(e) {
    console.error('Failed to load watch log:', e);
  }
}

function renderStats() {
  const sp = document.getElementById('stats-page');
  if (!watchLogData.length) {
    sp.innerHTML = '<p style="color:var(--muted);padding:40px;text-align:center">Loading stats…</p>';
    loadWatchLog().then(() => renderStats());
    return;
  }

  // Get all years present in log
  const years = [...new Set(watchLogData.map(e => e.date.substring(0,4)).filter(Boolean))].sort().reverse();
  const curYear = years[0] || new Date().getFullYear().toString();

  sp.innerHTML = `
    <div style="max-width:1100px;margin:0 auto">
      <h2 style="font-family:'DM Serif Display',serif;font-size:28px;color:var(--accent);margin-bottom:20px">Your Stats</h2>

      <div class="stats-grid">
        ${renderAllTimeCard()}
        ${render1001Card()}
      </div>

      <h3 style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:14px">Yearly Overview</h3>
      ${renderYearlyCard(years)}

      <h3 style="font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin:20px 0 14px">Monthly Breakdown</h3>
      <select class="year-select" id="month-year-sel" onchange="renderMonthly(this.value)">
        ${years.map(y => `<option value="${y}"${y===curYear?' selected':''}>${y}</option>`).join('')}
      </select>
      <div id="monthly-breakdown"></div>
    </div>
  `;

  renderMonthly(curYear);
}

function renderAllTimeCard() {
  const totalMovies = watchLogData.filter(e => e.type === 'Movie').length;
  const totalTV     = watchLogData.filter(e => e.type === 'TV Show').length;
  const total       = watchLogData.length;
  const uniqueMovies = new Set(watchLogData.filter(e=>e.type==='Movie').map(e=>e.title+e.year)).size;
  const rewatches    = totalMovies - uniqueMovies;
  return `
    <div class="stat-card">
      <h3>All Time</h3>
      <div class="stat-row"><span class="label">Total watches</span><span class="value">${total.toLocaleString()}</span></div>
      <div class="stat-row"><span class="label">Movies watched</span><span class="value">${totalMovies.toLocaleString()}</span></div>
      <div class="stat-row"><span class="label">Unique movies</span><span class="value">${uniqueMovies.toLocaleString()}</span></div>
      <div class="stat-row"><span class="label">Movie rewatches</span><span class="value">${rewatches.toLocaleString()}</span></div>
      <div class="stat-row"><span class="label">TV show watches</span><span class="value">${totalTV.toLocaleString()}</span></div>
    </div>`;
}

function render1001Card() {
  const total1001   = allItems.filter(i => i._type==='movie' && i.list1001.toLowerCase()==='yes').length;
  const watched1001 = allItems.filter(i => i._type==='movie' && i.list1001.toLowerCase()==='yes' && i.watched.toLowerCase()==='yes').length;
  const pct = total1001 > 0 ? Math.round(watched1001 / total1001 * 100) : 0;
  const r = 34, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return `
    <div class="stat-card">
      <h3>1001 List Completion</h3>
      <div class="completion-ring">
        <div class="ring-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--border)" stroke-width="7"/>
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--accent)" stroke-width="7"
              stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}" stroke-linecap="round"/>
          </svg>
          <div class="ring-pct">${pct}%</div>
        </div>
        <div class="ring-info">
          <strong>${watched1001}</strong> watched<br>
          <strong>${total1001 - watched1001}</strong> remaining<br>
          <span>of ${total1001} total films</span>
        </div>
      </div>
    </div>`;
}

function renderYearlyCard(years) {
  const byYear = {};
  watchLogData.forEach(e => {
    const y = e.date.substring(0,4);
    if (!byYear[y]) byYear[y] = {m:0, tv:0};
    if (e.type==='Movie') byYear[y].m++;
    else byYear[y].tv++;
  });
  const maxTotal = Math.max(...Object.values(byYear).map(v=>v.m+v.tv), 1);
  const rows = years.slice(0, 10).map(y => {
    const v = byYear[y] || {m:0,tv:0};
    const total = v.m + v.tv;
    const mPct  = Math.round(v.m / maxTotal * 100);
    const tvPct = Math.round(v.tv / maxTotal * 100);
    return `
      <div style="margin-bottom:10px">
        <div class="bar-label"><span>${y}</span><span>${total.toLocaleString()} (${v.m} movies, ${v.tv} TV)</span></div>
        <div class="bar-track" style="height:8px;margin-bottom:3px">
          <div class="bar-fill" style="width:${mPct}%"></div>
        </div>
        <div class="bar-track" style="height:8px">
          <div class="bar-fill tv" style="width:${tvPct}%"></div>
        </div>
      </div>`;
  }).join('');
  return `
    <div class="stat-card" style="grid-column:1/-1">
      <h3>Yearly Totals <span style="font-size:11px;color:var(--muted);font-family:'DM Sans',sans-serif">— <span style="color:var(--accent)">■</span> Movies &nbsp;<span style="color:var(--accent2)">■</span> TV</span></h3>
      ${rows}
    </div>`;
}

function renderMonthly(year) {
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const byMonth = Array(12).fill(0).map(()=>({m:0,tv:0}));
  watchLogData.filter(e => e.date.startsWith(year)).forEach(e => {
    const mo = parseInt(e.date.substring(5,7)) - 1;
    if (e.type==='Movie') byMonth[mo].m++;
    else byMonth[mo].tv++;
  });
  const maxVal = Math.max(...byMonth.map(v=>v.m+v.tv), 1);
  const cells = byMonth.map((v,i) => {
    const total = v.m+v.tv;
    const pct   = Math.round(total/maxVal*100);
    return `
      <div class="month-cell${total>0?' has-watches':''}">
        <div class="bar-track" style="height:40px;display:flex;align-items:flex-end;margin-bottom:4px;background:transparent">
          <div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:1px">
            ${v.m  > 0 ? `<div style="height:${Math.round(v.m /maxVal*36)}px;background:var(--accent);border-radius:2px"></div>` : ''}
            ${v.tv > 0 ? `<div style="height:${Math.round(v.tv/maxVal*36)}px;background:var(--accent2);border-radius:2px"></div>` : ''}
          </div>
        </div>
        <div class="mn">${MONTHS[i]}</div>
        <div class="mc" style="font-size:13px;color:${total>0?'var(--text)':'var(--muted)'}">${total||'·'}</div>
      </div>`;
  }).join('');
  const bd = document.getElementById('monthly-breakdown');
  if (bd) bd.innerHTML = `<div class="stat-card"><div class="month-grid">${cells}</div></div>`;
}

// ── TMDb Season Check ─────────────────────────────────────────
const tmdbSeasonCache = {};

async function checkTVSeasons(item) {
  if (!item.tmdbId || item._type !== 'tv') return null;
  if (tmdbSeasonCache[item.tmdbId] !== undefined) return tmdbSeasonCache[item.tmdbId];

  try {
    const url  = `https://api.themoviedb.org/3/tv/${item.tmdbId}?api_key=${TMDB_KEY}`;
    const data = await fetch(url).then(r=>r.json());
    // Filter out specials (season 0) and count only regular seasons
    const latestSeason = (data.seasons||[]).filter(s=>s.season_number>0).length;
    tmdbSeasonCache[item.tmdbId] = latestSeason;
    return latestSeason;
  } catch(e) {
    tmdbSeasonCache[item.tmdbId] = null;
    return null;
  }
}

function parseCollectedSeasons(seasonsStr) {
  if (!seasonsStr) return [];
  return String(seasonsStr).split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n));
}

async function updateSeasonBadge(item, card) {
  if (item._type !== 'tv') return;
  const latest = await checkTVSeasons(item);
  if (!latest) return;

  // Update watch button opacity now that we know total seasons
  const btn = card.querySelector('.act-watch');
  if (btn) updateTVWatchBtn(btn, item, latest);

  // Collection incomplete badge
  if (item.collection && item.collection.toLowerCase() === 'yes') {
    const collected = parseCollectedSeasons(item.seasons);
    if (collected.length < latest) {
      const pw = card.querySelector('.poster-wrap');
      if (pw && !pw.querySelector('.season-badge')) {
        const badge = document.createElement('div');
        badge.className = 'season-badge';
        badge.style.cssText = 'position:absolute;bottom:6px;left:6px;background:rgba(232,126,126,.9);color:#fff;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px;z-index:3;backdrop-filter:blur(4px)';
        badge.title = `Collected: seasons ${collected.join(', ')} of ${latest}`;
        badge.textContent = `S${collected.length}/${latest}`;
        pw.appendChild(badge);
      }
    }
  }

  // Watched incomplete badge
  const watchedSeasons = parseWatchedSeasons(item.seasonsWatched);
  if (watchedSeasons.length > 0 && watchedSeasons.length < latest) {
    const pw = card.querySelector('.poster-wrap');
    if (pw && !pw.querySelector('.watch-badge')) {
      const badge = document.createElement('div');
      badge.className = 'watch-badge';
      badge.style.cssText = 'position:absolute;bottom:6px;right:6px;background:rgba(91,186,138,.85);color:#001a0a;font-size:9px;font-weight:bold;padding:2px 6px;border-radius:4px;z-index:3;backdrop-filter:blur(4px)';
      badge.title = `Watched: seasons ${watchedSeasons.join(', ')} of ${latest}`;
      badge.textContent = `👁 ${watchedSeasons.length}/${latest}`;
      pw.appendChild(badge);
    }
  }
}

// ── Sort memory per filter combination ───────────────────────
// Key = serialized filter state, value = sort choice
// Persisted in localStorage so it survives page reloads

function getSortKey() {
  // Build a key from all active filters (except sort itself)
  const type    = document.getElementById('tb-all')?.classList.contains('active') ? 'all' :
                  document.getElementById('tb-movies')?.classList.contains('active') ? 'movie' : 'tv';
  const search  = document.getElementById('f-search')?.value || '';
  const watched = document.getElementById('f-watched')?.value || '';
  const collect = document.getElementById('f-collect')?.value || '';
  const list    = document.getElementById('f-list')?.value || '';
  const y1      = document.getElementById('f-y1')?.value || '';
  const y2      = document.getElementById('f-y2')?.value || '';
  const r1      = document.getElementById('f-r1')?.value || '';
  const r2      = document.getElementById('f-r2')?.value || '';
  const country = document.getElementById('f-country')?.value || '';
  const lang    = document.getElementById('f-lang')?.value || '';
  return `sort|${type}|${search}|${watched}|${collect}|${list}|${y1}|${y2}|${r1}|${r2}|${country}|${lang}`;
}

function saveSort(sortVal) {
  try {
    const key = getSortKey();
    const saved = JSON.parse(localStorage.getItem('mv_sorts') || '{}');
    saved[key] = sortVal;
    // Keep only last 50 sort preferences to avoid bloat
    const keys = Object.keys(saved);
    if (keys.length > 50) delete saved[keys[0]];
    localStorage.setItem('mv_sorts', JSON.stringify(saved));
  } catch(e) {}
}

function recallSort() {
  try {
    const key   = getSortKey();
    const saved = JSON.parse(localStorage.getItem('mv_sorts') || '{}');
    const sel   = document.getElementById('f-sort');
    if (saved[key] && sel) {
      sel.value = saved[key];
    }
  } catch(e) {}
}

// ── Large targets toggle ──────────────────────────────────────
function toggleLargeTargets() {
  const active = document.body.classList.toggle('large-targets');
  document.getElementById('large-target-btn').classList.toggle('active', active);
  try { localStorage.setItem('mv_large_targets', active ? '1' : '0'); } catch(e) {}
}

function restoreLargeTargets() {
  try {
    if (localStorage.getItem('mv_large_targets') === '1') {
      document.body.classList.add('large-targets');
      const btn = document.getElementById('large-target-btn');
      if (btn) btn.classList.add('active');
    }
  } catch(e) {}
}

// ── TV Poster Debug ──────────────────────────────────────────
function debugTVPosters() {
  const tvItems = allItems.filter(i => i._type === 'tv');
  const withPoster = tvItems.filter(i => i.poster);
  const sample = tvItems.slice(0, 3);

  let msg = `TV items: ${tvItems.length}\n`;
  msg += `With poster: ${withPoster.length}\n\n`;
  msg += `First 3 TV items:\n`;
  sample.forEach(i => {
    msg += `  ${i.title}: poster="${i.poster ? i.poster.substring(0,40)+'...' : 'EMPTY'}"\n`;
    msg += `    _row=${i._row}, tmdbId="${i.tmdbId}"\n`;
  });

  // Also show raw sheet data for first TV row
  fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent('TV Shows')}!A2:V2`, {
    headers: { Authorization: 'Bearer ' + accessToken }
  }).then(r => r.json()).then(d => {
    const row = (d.values || [[]])[0];
    msg += `\nRaw row 2 from sheet (${row.length} cols):\n`;
    row.forEach((v, i) => msg += `  [${i}]: ${String(v).substring(0, 40)}\n`);

    const div = document.createElement('div');
    div.style.cssText = 'position:fixed;inset:20px;background:#1a1a2e;color:#eee;padding:20px;border-radius:10px;overflow:auto;z-index:9999;font-size:11px;font-family:monospace;border:1px solid #444;white-space:pre';
    div.textContent = msg;
    const close = document.createElement('button');
    close.textContent = '✕ Close';
    close.style.cssText = 'position:absolute;top:10px;right:10px;background:#444;border:none;color:#eee;padding:6px 12px;border-radius:5px;cursor:pointer;';
    close.onclick = () => div.remove();
    div.appendChild(close);
    document.body.appendChild(div);
  });
}
